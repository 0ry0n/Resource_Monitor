name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GLib Tools
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin gjs gettext

      - name: Run Validation Suite
        run: make validate
